<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Layout Lab</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px -apple-system, system-ui, sans-serif; background: #0b0c10; color: #e6e6e6; }
  #toolbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; padding: 8px 12px; background: #15171d; border-bottom: 1px solid #2a2d36; position: sticky; top: 0; z-index: 10; }
  #toolbar select, #toolbar button { font: inherit; background: #21242d; color: #e6e6e6; border: 1px solid #3a3e49; border-radius: 8px; padding: 5px 9px; cursor: pointer; }
  #toolbar button:hover { background: #2c303b; }
  #toolbar button.on { background: var(--color-accentBlue, #2563eb); color: #fff; border-color: transparent; }
  #toolbar .sep { width: 1px; height: 22px; background: #2a2d36; margin: 0 4px; }
  #toolbar label { color: #9aa0aa; font-size: 12px; }
  #notes { width: 260px; background: #21242d; color: #e6e6e6; border: 1px solid #3a3e49; border-radius: 8px; padding: 5px 9px; font: inherit; }
  #stage-wrap { padding: 18px; display: flex; gap: 18px; align-items: flex-start; overflow-x: auto; }
  .canvas { background: var(--color-shellBg, #181a20); border: 1px solid var(--color-shellBorder, rgba(255,255,255,0.1)); border-radius: var(--radius-panel, 22px); backdrop-filter: blur(var(--blur-shell, 14px)); overflow: hidden; flex: none; display: flex; flex-direction: column; max-height: calc(100dvh - 96px); }
  .canvas-title { font-size: 11px; color: #9aa0aa; padding: 6px 12px; border-bottom: 1px solid var(--color-shellBorder, rgba(255,255,255,0.1)); }
  .grid { display: grid; position: relative; flex: 1 1 auto; min-height: 0; }
  .cell { position: relative; min-width: 0; overflow: hidden; }
  /* Each pane is its own container-query context so its contents react to pane width. */
  .pane { container-type: inline-size; height: 100%; overflow: auto; padding: 10px; color: var(--color-textPrimary, #fff); }
  /* Column-divider handles overlay the grid (left set in JS); work for single- and multi-row grids. */
  .handle { position: absolute; top: 0; width: 8px; height: 100%; cursor: col-resize; z-index: 5; }
  .handle::after { content: ''; position: absolute; left: 3px; top: 0; width: 2px; height: 100%; background: var(--color-shellBorder, rgba(255,255,255,0.14)); }
  .handle:hover::after, .handle.active::after { background: var(--color-accentBlue, #2563eb); width: 3px; left: 2.5px; }
  .drawer { border-top: 1px dashed var(--color-shellBorder, rgba(255,255,255,0.1)); }
  .pane-toggle { display: flex; gap: 6px; margin-bottom: 8px; }
  .pane-toggle button { font: 11px inherit; background: #21242d; color: #cfd3da; border: 1px solid #3a3e49; border-radius: 6px; padding: 3px 7px; cursor: pointer; }
  .pane-toggle button.on { background: var(--color-accentBlue, #2563eb); color: #fff; border-color: transparent; }

  /* ---- example content classes (used by the demo config renderers) ---- */
  .ll-msg { margin: 6px 0; padding: 7px 10px; border-radius: 12px; line-height: 1.45; max-width: 85%; background: rgba(255,255,255,0.05); }
  .ll-user { margin-left: auto; max-width: 72%; background: var(--color-accentBlue, #2563eb); color: #fff; }
  .ll-interviewer { font-style: italic; color: var(--color-textMuted, #b9bdc6); background: transparent; }
  .ll-rolechip { display: block; font-style: normal; font-size: 10px; letter-spacing: .04em; color: #7d8390; margin-bottom: 2px; text-transform: uppercase; }
  .ll-system { background: rgba(255,255,255,0.04); }
  .ll-badge { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: .05em; border: 1px solid; border-radius: 5px; padding: 0 5px; margin-right: 6px; }
  .ll-cards { display: flex; flex-direction: column; gap: 8px; }
  .ll-card { border: 1px solid; border-radius: 10px; padding: 8px 10px; background: rgba(255,255,255,0.03); }
  .ll-card-h { font-size: 10px; font-weight: 700; letter-spacing: .05em; margin-bottom: 3px; }
  .ll-card-b { font-size: 13px; line-height: 1.4; }
  .ll-terms { display: flex; flex-direction: column; gap: 6px; }
  .ll-term { display: flex; flex-direction: column; }
  .ll-term-k { font-weight: 700; font-size: 12px; }
  .ll-term-d { font-size: 12px; color: var(--color-textMuted, #b9bdc6); }
  .ll-health { display: flex; flex-direction: column; gap: 6px; }
  .ll-pill { font-size: 12px; border: 1px solid; border-radius: 9999px; padding: 2px 9px; align-self: flex-start; }
  /* Container query: when a suggestions pane gets narrow, tighten the cards. */
  @container (max-width: 240px) { .ll-card-b { font-size: 12px; } .ll-msg { max-width: 100%; } }

  /* Generic app-"chrome" classes (header/footer bars, controls) for multi-row configs. */
  .ll-bar { display: flex; align-items: center; gap: 8px; padding: 6px 8px; }
  .ll-logo { color: var(--color-accentBlue, #3b82f6); font-size: 14px; }
  .ll-title { font-weight: 600; font-size: 13px; }
  .ll-spacer { flex: 1; }
  .ll-ctl { font: 12px inherit; background: rgba(255,255,255,0.08); color: var(--color-textPrimary, #fff); border: 1px solid var(--color-shellBorder, rgba(255,255,255,0.14)); border-radius: 8px; padding: 3px 9px; cursor: pointer; }
  .ll-ctl.ll-stop { color: var(--color-error, #f43f5e); border-color: var(--color-error, #f43f5e); }
  .ll-input { flex: 1; font: 13px inherit; background: rgba(255,255,255,0.06); color: var(--color-textPrimary, #fff); border: 1px solid var(--color-shellBorder, rgba(255,255,255,0.14)); border-radius: 10px; padding: 5px 10px; }
  .ll-pad { display: flex; flex-wrap: wrap; gap: 6px; }
  .ll-pad button { font: 12px inherit; background: rgba(255,255,255,0.06); color: var(--color-textPrimary,#fff); border: 1px solid var(--color-shellBorder, rgba(255,255,255,0.14)); border-radius: 9999px; padding: 4px 10px; cursor: pointer; text-align: left; }

  #export-out { white-space: pre; font: 12px ui-monospace, Menlo, monospace; background: #0d0f14; border: 1px solid #2a2d36; border-radius: 8px; padding: 10px; margin: 0 18px 18px; max-height: 220px; overflow: auto; display: none; color: #cfe; }
  #config-editor { margin: 0 18px 18px; display: none; }
  #config-editor textarea { width: 100%; height: 160px; background: #0d0f14; color: #cfe; border: 1px solid #2a2d36; border-radius: 8px; font: 12px ui-monospace, Menlo, monospace; padding: 8px; }
  .err { color: #ff8a8a; padding: 18px; }

  /* Preview/device mode (?preview=1): full-bleed single variant at the device's real
     viewport width — open on a phone for a true-size view. */
  body.preview { overflow: hidden; }
  body.preview #toolbar, body.preview #export-out, body.preview #config-editor { display: none; }
  body.preview #stage-wrap { padding: 0; overflow: visible; }
  /* Fix the canvas to the exact device height so there's no dead space AND no overflow:
     the 1fr row (conversation/mirror) scrolls internally while header/command-pad stay
     pinned (pad in the thumb zone). */
  body.preview .canvas { border: none; border-radius: 0; height: 100dvh; max-height: 100dvh; }
  body.preview .grid { min-height: 0; }
  body.preview .canvas-title { display: none; }
</style>
</head>
<body>
<div id="toolbar">
  <label>Variant</label>
  <select id="variant-select"></select>
  <span class="sep"></span>
  <label>Width</label>
  <span id="width-presets"></span>
  <span class="sep"></span>
  <button id="compare-toggle">Compare: off</button>
  <span class="sep"></span>
  <button id="export-grid">Copy grid</button>
  <button id="export-css">Copy CSS vars</button>
  <button id="export-tw">Copy Tailwind</button>
  <button id="export-show">Show export</button>
  <span class="sep"></span>
  <input id="notes" placeholder="notes for this variant…" />
  <button id="config-btn">Config</button>
</div>
<div id="config-editor">
  <textarea id="config-text" placeholder="Paste a *.config.js body here; it must set globalThis.LAYOUT_LAB_CONFIG. Saved to localStorage."></textarea>
  <button id="config-load">Load pasted config</button>
  <button id="config-clear">Clear saved config</button>
</div>
<pre id="export-out"></pre>
<div id="stage-wrap"><div class="err" id="boot">Loading…</div></div>

<script src="./layout-core.js"></script>
<script>
(function () {
  'use strict';
  const LS_STATE = 'layoutlab:state';
  const LS_CONFIG = 'layoutlab:config:pasted';
  const MIN_PX = 120;

  // ---------- config resolution ----------
  function injectScript(src) {
    return new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = src;
      s.onload = resolve;
      s.onerror = () => reject(new Error('failed to load config: ' + src));
      document.head.appendChild(s);
    });
  }

  async function resolveConfig() {
    const params = new URLSearchParams(location.search);
    const fromQuery = params.get('config');
    if (fromQuery) { await injectScript(fromQuery); return window.LAYOUT_LAB_CONFIG; }
    const pasted = localStorage.getItem(LS_CONFIG);
    if (pasted) {
      try { new Function(pasted)(); /* config sets window.LAYOUT_LAB_CONFIG */ }
      catch (e) { console.error('pasted config error', e); }
      if (window.LAYOUT_LAB_CONFIG) return window.LAYOUT_LAB_CONFIG;
    }
    await injectScript('./configs/demo.config.js');
    return window.LAYOUT_LAB_CONFIG;
  }

  // ---------- state ----------
  let CONFIG = null;
  // fit:true => canvas fills the window (no horizontal scrollbar; default). autoscroll:true
  // => conversation panes pin to the latest message.
  let state = { variant: null, width: 1080, fit: true, autoscroll: true, sizes: {}, toggles: {}, notes: {}, compare: false };

  function loadState() {
    const fromHash = location.hash.startsWith('#s=') ? LayoutCore.decodeState(location.hash.slice(3)) : null;
    const fromLS = (() => { try { return JSON.parse(localStorage.getItem(LS_STATE)); } catch (_e) { return null; } })();
    const merged = fromHash || fromLS;
    if (merged) state = Object.assign(state, merged);
  }
  function saveState() {
    localStorage.setItem(LS_STATE, JSON.stringify(state));
    location.replace('#s=' + LayoutCore.encodeState(state));
  }

  // ---------- sizing helpers ----------
  function variantById(id) { return CONFIG.variants.find((v) => v.id === id); }
  function colCount(v) { return v.grid.columns.trim().split(/\s+/).length; }
  function defaultSizes(v, totalWidth) {
    // Honor the variant's fr proportions, gap-aware so columns + gaps fit exactly
    // (no right-edge clipping, and declared proportions actually render).
    return LayoutCore.columnSizesFromTemplate(v.grid.columns, totalWidth, gapNum(), MIN_PX);
  }
  function sizesFor(v, totalWidth) {
    const cur = state.sizes[v.id];
    if (cur && cur.length === colCount(v)) {
      // Rescale dragged/cached sizes to the current width (keeps ratios, fits the canvas).
      return LayoutCore.fitSizes(cur, totalWidth, gapNum());
    }
    const d = defaultSizes(v, totalWidth);
    state.sizes[v.id] = d;
    return d;
  }
  function gapPx() { return (CONFIG.tokens.space && CONFIG.tokens.space.md) || '12px'; }
  // Effective canvas width: fill the window when fit is on (no horizontal scrollbar),
  // otherwise the chosen fixed preset width.
  function fitWidth() {
    const wrap = document.getElementById('stage-wrap');
    const avail = (wrap ? wrap.clientWidth : window.innerWidth) - (document.body.classList.contains('preview') ? 0 : 24);
    return Math.max(360, avail);
  }
  function effectiveWidth() { return state.fit && !state.compare ? fitWidth() : state.width; }

  // ---------- rendering ----------
  function renderPaneContent(pane, areaName) {
    if (pane.toggle) {
      const active = state.toggles[areaName] || pane.toggle[0];
      const buttons = pane.toggle.map((t) =>
        `<button data-toggle-area="${areaName}" data-toggle-val="${t}" class="${t === active ? 'on' : ''}">${t}</button>`).join('');
      const body = CONFIG.renderers[active] ? CONFIG.renderers[active](CONFIG.seed, CONFIG.tokens) : '';
      return `<div class="pane-toggle">${buttons}</div>${body}`;
    }
    const r = CONFIG.renderers[pane.render];
    return r ? r(CONFIG.seed, CONFIG.tokens) : `<em>missing renderer: ${pane.render}</em>`;
  }

  function gapNum() { return parseInt(gapPx(), 10) || 0; }

  function positionHandles(grid, sizes) {
    const offsets = LayoutCore.columnHandleOffsets(sizes, gapNum());
    grid.querySelectorAll('.handle').forEach((h, i) => { h.style.left = (offsets[i] - 4) + 'px'; });
  }

  function buildCanvas(v, width, withHandles) {
    const sizes = sizesFor(v, width);
    const canvas = document.createElement('div');
    canvas.className = 'canvas';
    canvas.style.width = width + 'px';
    canvas.dataset.variant = v.id;

    const title = document.createElement('div');
    title.className = 'canvas-title';
    title.textContent = v.name + '  ·  ' + width + 'px';
    canvas.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'grid';
    grid.style.gridTemplateColumns = LayoutCore.gridTemplateColumnsFromSizes(sizes);
    grid.style.gridTemplateAreas = v.grid.areas;
    if (v.grid.rows) grid.style.gridTemplateRows = v.grid.rows;
    grid.style.gap = gapPx();

    // One cell per UNIQUE area name (areas may span multiple rows/cols via grid-template-areas).
    LayoutCore.uniqueAreas(v.grid.areas).forEach((areaName) => {
      const pane = (v.panes || {})[areaName];
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.style.gridArea = areaName;
      const paneEl = document.createElement('div');
      paneEl.className = 'pane';
      paneEl.innerHTML = pane ? renderPaneContent(pane, areaName) : '';
      cell.appendChild(paneEl);
      grid.appendChild(cell);
    });

    // Full-height column-divider handles overlaying the grid (one per internal column boundary).
    if (withHandles) {
      const n = colCount(v);
      for (let i = 0; i < n - 1; i++) {
        const h = document.createElement('div');
        h.className = 'handle';
        h.dataset.handleIndex = String(i);
        grid.appendChild(h);
      }
      // Position after layout settles (needs the grid in the DOM for height).
      requestAnimationFrame(() => positionHandles(grid, sizesFor(v, width)));
    }

    canvas.appendChild(grid);

    if (v.drawer) {
      const d = document.createElement('div');
      d.className = 'pane drawer';
      d.innerHTML = CONFIG.renderers[v.drawer.render] ? CONFIG.renderers[v.drawer.render](CONFIG.seed, CONFIG.tokens) : '';
      canvas.appendChild(d);
    }
    return { canvas, grid };
  }

  function attachResize(grid, v) {
    let active = null;
    grid.addEventListener('pointerdown', (e) => {
      const h = e.target.closest('.handle');
      if (!h) return;
      h.classList.add('active');
      active = { handle: h, index: Number(h.dataset.handleIndex), startX: e.clientX, startSizes: sizesFor(v, effectiveWidth()).slice() };
      grid.setPointerCapture(e.pointerId);
      e.preventDefault();
    });
    grid.addEventListener('pointermove', (e) => {
      if (!active) return;
      const delta = e.clientX - active.startX;
      const next = LayoutCore.resizeColumns(active.startSizes, active.index, delta, MIN_PX);
      state.sizes[v.id] = next;
      grid.style.gridTemplateColumns = LayoutCore.gridTemplateColumnsFromSizes(next);
      positionHandles(grid, next);
    });
    const end = (e) => {
      if (!active) return;
      active.handle.classList.remove('active');
      active = null;
      try { grid.releasePointerCapture(e.pointerId); } catch (_e) {}
      saveState();
    };
    grid.addEventListener('pointerup', end);
    grid.addEventListener('pointercancel', end);
  }

  function render() {
    const wrap = document.getElementById('stage-wrap');
    wrap.innerHTML = '';
    const variants = state.compare
      ? CONFIG.variants
      : [variantById(state.variant) || CONFIG.variants[0]];
    const width = state.compare ? state.width : effectiveWidth();
    variants.forEach((v) => {
      const { canvas, grid } = buildCanvas(v, width, !state.compare);
      if (!state.compare) attachResize(grid, v);
      wrap.appendChild(canvas);
    });
    // Reflect app-toggle state (e.g. autoscroll) on its buttons.
    wrap.querySelectorAll('button[data-app-toggle]').forEach((b) => {
      b.classList.toggle('on', !!state[b.dataset.appToggle]);
    });
    // Autoscroll: pin conversation panes to the latest message.
    if (state.autoscroll !== false) {
      wrap.querySelectorAll('[data-autoscroll]').forEach((el) => {
        const pane = el.closest('.pane'); if (pane) pane.scrollTop = pane.scrollHeight;
      });
    }
    // Delegated clicks (side toggle + app toggles); re-added each render.
    wrap.addEventListener('click', (e) => {
      const tog = e.target.closest('button[data-toggle-area]');
      if (tog) { state.toggles[tog.dataset.toggleArea] = tog.dataset.toggleVal; saveState(); render(); return; }
      const app = e.target.closest('button[data-app-toggle]');
      if (app) { state[app.dataset.appToggle] = !state[app.dataset.appToggle]; saveState(); render(); return; }
    }, { once: true });
  }

  // ---------- export ----------
  function activeVariant() { return variantById(state.variant) || CONFIG.variants[0]; }
  function exportGrid() {
    const v = activeVariant();
    return LayoutCore.gridTemplateExport({ areas: v.grid.areas, gap: gapPx(), sizes: sizesFor(v, effectiveWidth()) });
  }
  function copy(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(text).catch(() => {});
    const out = document.getElementById('export-out');
    out.style.display = 'block';
    out.textContent = text;
  }

  // ---------- toolbar wiring ----------
  function buildToolbar() {
    const sel = document.getElementById('variant-select');
    sel.innerHTML = CONFIG.variants.map((v) => `<option value="${v.id}">${v.name}</option>`).join('');
    sel.value = state.variant || CONFIG.variants[0].id;
    state.variant = sel.value;
    sel.addEventListener('change', () => { state.variant = sel.value; saveState(); render(); });

    const presets = document.getElementById('width-presets');
    presets.innerHTML = `<button data-w="fit">Fit window</button>`
      + (CONFIG.widthPresets || []).map((p) => `<button data-w="${p.px}">${p.label}</button>`).join('')
      + `<button data-w="custom">+</button>`;
    function markPresets() {
      presets.querySelectorAll('button[data-w]').forEach((b) => {
        const on = (b.dataset.w === 'fit' && state.fit) || (!state.fit && b.dataset.w === String(state.width));
        b.classList.toggle('on', on);
      });
    }
    presets.addEventListener('click', (e) => {
      const b = e.target.closest('button[data-w]'); if (!b) return;
      if (b.dataset.w === 'fit') { state.fit = true; }
      else if (b.dataset.w === 'custom') {
        const v = prompt('Canvas width in px', String(state.width));
        const n = Number(v); if (n > 0) { state.width = n; state.fit = false; }
      } else { state.width = Number(b.dataset.w); state.fit = false; }
      markPresets(); saveState(); render();
    });
    markPresets();

    const cmp = document.getElementById('compare-toggle');
    cmp.addEventListener('click', () => { state.compare = !state.compare; cmp.textContent = 'Compare: ' + (state.compare ? 'on' : 'off'); saveState(); render(); });
    cmp.textContent = 'Compare: ' + (state.compare ? 'on' : 'off');

    const notes = document.getElementById('notes');
    notes.value = state.notes[state.variant] || '';
    notes.addEventListener('input', () => { state.notes[state.variant] = notes.value; saveState(); });
    sel.addEventListener('change', () => { notes.value = state.notes[state.variant] || ''; });

    document.getElementById('export-grid').addEventListener('click', () => copy(exportGrid()));
    document.getElementById('export-css').addEventListener('click', () => copy(LayoutCore.tokensToCssVars(CONFIG.tokens)));
    document.getElementById('export-tw').addEventListener('click', () => copy(LayoutCore.tokensToTailwind(CONFIG.tokens)));
    document.getElementById('export-show').addEventListener('click', () => {
      const out = document.getElementById('export-out');
      out.style.display = out.style.display === 'none' ? 'block' : 'none';
    });

    const editor = document.getElementById('config-editor');
    document.getElementById('config-btn').addEventListener('click', () => { editor.style.display = editor.style.display === 'none' ? 'block' : 'none'; });
    document.getElementById('config-load').addEventListener('click', () => {
      const txt = document.getElementById('config-text').value;
      localStorage.setItem(LS_CONFIG, txt);
      location.search = ''; location.reload();
    });
    document.getElementById('config-clear').addEventListener('click', () => { localStorage.removeItem(LS_CONFIG); location.reload(); });
  }

  // ---------- boot ----------
  (async function boot() {
    try {
      CONFIG = await resolveConfig();
      const check = LayoutCore.validateConfig(CONFIG);
      if (!check.ok) { document.getElementById('stage-wrap').innerHTML = '<div class="err">Invalid config:<br>' + check.errors.join('<br>') + '</div>'; return; }
      // Inject token CSS vars so renderers can use var(--group-key).
      const styleEl = document.createElement('style');
      styleEl.textContent = LayoutCore.tokensToCssVars(CONFIG.tokens);
      document.head.appendChild(styleEl);
      loadState();
      if (!state.variant) state.variant = CONFIG.variants[0].id;
      // Preview/device mode: ?preview=1[&variant=ID] — full-bleed single variant at the
      // device's real viewport width (open on a phone for a true-size view); no toolbar.
      const bootParams = new URLSearchParams(location.search);
      const isPreview = bootParams.get('preview') === '1';
      if (isPreview) {
        document.body.classList.add('preview');
        state.compare = false;
        state.fit = false; // preview uses the device's exact viewport width
        const pv = bootParams.get('variant');
        if (pv && CONFIG.variants.some((v) => v.id === pv)) state.variant = pv;
        state.width = window.innerWidth;
      }
      buildToolbar();
      render();
      // Re-render on resize/orientation so fit-to-window and preview track the viewport.
      let resizeT;
      window.addEventListener('resize', () => {
        if (isPreview) state.width = window.innerWidth;
        if (isPreview || state.fit) { clearTimeout(resizeT); resizeT = setTimeout(render, 80); }
      });
    } catch (e) {
      document.getElementById('stage-wrap').innerHTML = '<div class="err">Boot error: ' + (e && e.message) + '</div>';
      console.error(e);
    }
  })();
})();
</script>
</body>
</html>
